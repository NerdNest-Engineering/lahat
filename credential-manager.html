<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline';
                 connect-src 'self';
                 img-src 'self' data:;
                 font-src 'self';
                 object-src 'none';
                 base-uri 'none';
                 form-action 'none';">
  <title>Credential Manager</title>
  <link rel="stylesheet" href="styles/daisyui.css">
  <link rel="stylesheet" href="styles/daisyui-themes.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles/fonts.css">
</head>
<body data-theme="light" class="bg-base-100">
  <div class="drag-region"></div>
  <div class="window">
    <div class="titlebar">Credential Manager</div>
    <div class="content">
      <!-- Header -->
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-base-content mb-2">Credential Manager</h1>
        <p class="text-base-content/70">Securely manage your API keys and credentials for Lahat applications.</p>
      </div>

      <!-- Add New Credential Section -->
      <div class="card bg-base-100 shadow-md border border-base-300/50 mb-6">
        <div class="card-body">
          <h2 class="card-title mb-4">Add New Credential</h2>
          
          <form id="add-credential-form" class="space-y-4">
            <div class="form-control">
              <label class="label" for="credential-name">
                <span class="label-text font-medium">Name</span>
              </label>
              <input 
                type="text" 
                id="credential-name" 
                placeholder="e.g., OpenAI API Key, Claude API Key" 
                class="input input-bordered" 
                required 
              />
            </div>

            <div class="form-control">
              <label class="label" for="credential-type">
                <span class="label-text font-medium">Type</span>
              </label>
              <select id="credential-type" class="select select-bordered" required>
                <option value="">Select credential type</option>
                <option value="api-key">API Key</option>
                <option value="token">Bearer Token</option>
                <option value="username-password">Username & Password</option>
                <option value="oauth">OAuth Token</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="form-control" id="api-key-field">
              <label class="label" for="credential-value">
                <span class="label-text font-medium">API Key</span>
              </label>
              <input 
                type="password" 
                id="credential-value" 
                placeholder="Enter your API key" 
                class="input input-bordered" 
                required 
              />
              <label class="label">
                <span class="label-text-alt text-warning">
                  <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                  </svg>
                  Credentials are encrypted and stored securely
                </span>
              </label>
            </div>

            <div class="form-control hidden" id="username-password-fields">
              <label class="label" for="credential-username">
                <span class="label-text font-medium">Username</span>
              </label>
              <input 
                type="text" 
                id="credential-username" 
                placeholder="Enter username" 
                class="input input-bordered mb-3" 
              />
              <label class="label" for="credential-password">
                <span class="label-text font-medium">Password</span>
              </label>
              <input 
                type="password" 
                id="credential-password" 
                placeholder="Enter password" 
                class="input input-bordered" 
              />
            </div>

            <div class="form-control">
              <label class="label" for="credential-description">
                <span class="label-text font-medium">Description (Optional)</span>
              </label>
              <textarea 
                id="credential-description" 
                placeholder="Add notes about this credential" 
                class="textarea textarea-bordered" 
                rows="2"
              ></textarea>
            </div>

            <div class="card-actions justify-end">
              <button type="button" id="cancel-add-btn" class="btn btn-ghost">Cancel</button>
              <button type="submit" class="btn btn-primary">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
                Add Credential
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Existing Credentials Section -->
      <div class="card bg-base-100 shadow-md border border-base-300/50">
        <div class="card-body">
          <div class="flex justify-between items-center mb-4">
            <h2 class="card-title">Saved Credentials</h2>
            <div class="form-control">
              <input 
                type="text" 
                id="search-credentials" 
                placeholder="Search credentials..." 
                class="input input-bordered input-sm w-64" 
              />
            </div>
          </div>

          <!-- Credentials List -->
          <div id="credentials-list" class="space-y-3">
            <!-- Credentials will be dynamically loaded here -->
          </div>

          <!-- Empty State -->
          <div id="empty-state" class="text-center py-8 hidden">
            <div class="text-6xl mb-4 opacity-30">
              <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 0121 9z"></path>
              </svg>
            </div>
            <h3 class="text-lg font-semibold mb-2">No credentials yet</h3>
            <p class="text-base-content/70 mb-4">Add your first credential to get started</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="renderers/credential-manager.js" type="module"></script>
</body>
</html>
